services:
  # The Laravel Web Service
  - type: web
    name: uji-level
    runtime: docker
    env: docker
    plan: free
    region: singapore # Change to your preferred region
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true # Render will generate a new key if not provided
      - key: APP_URL
        fromService:
          type: web
          name: uji-level
          property: host
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: uji-level-db
          property: host
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        fromDatabase:
          name: uji-level-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: uji-level-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: uji-level-db
          property: password
      - key: RUN_MIGRATIONS
        value: true
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database

databases:
  # The PostgreSQL Database
  - name: uji-level-db
    plan: free
    region: singapore
